<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Floyd | Contacto</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark pt-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <span class="logo-p" style="border: 2px solid white; padding: 0 8px; margin-right: 5px;">P</span> PINK FLOYD
        </a>

        <div class="ms-auto d-none d-lg-flex gap-4 navbar-links">
            <a href="inicio.html" class="text-white-50 text-decoration-none">Inicio</a>
            <a href="Contact.html" class="text-white border-bottom text-decoration-none pb-1">Contacto</a>
        </div>
    </div>
</nav>

<main class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="row glass-container shadow-lg w-100 overflow-hidden" style="background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;">

        <div class="col-lg-5 p-5 d-flex flex-column justify-content-center" style="border-right: 1px solid rgba(255,255,255,0.1);">
            <div class="text-center mb-4">
                <img src="assets/img/prisma.jpg">
            </div>

            <h2 class="text-white mb-3" style="font-family: 'Cinzel', serif;">Envía tus pensamientos...</h2>
            <p class="text-white-50 mb-4">a través del cosmos y el tiempo.</p>

            <div class="d-flex flex-column gap-3">
                <p class="mb-1"><i class="fas fa-play-circle text-info me-2"></i> cosmic.thoughts@pinkfloyd.com</p>
                <p class="mb-1"><i class="fas fa-history me-2 text-info"></i> 1973 - 1994 and beyond...</p>
                <p class="mb-1"><i class="fas fa-hand-peace me-2 text-info"></i> Conexión espiritual</p>
            </div>
        </div>

        <div class="col-lg-7 p-5" style="background: rgba(0,0,0,0.3);">
            <h2 class="text-white mb-4 text-center" style="font-family: 'Cinzel', serif;">Envíanos un mensaje</h2>

            <form>
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-info border-secondary"><i class="fas fa-user-astronaut"></i></span>
                        <input type="text" class="form-control bg-transparent text-white border-secondary" placeholder="Tu Nombre" required>
                    </div>
                </div>
                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-info border-secondary"><i class="fas fa-magic"></i></span>
                        <input type="email" class="form-control bg-transparent text-white border-secondary" placeholder="Tu Correo" required>
                    </div>
                </div>
                <div class="mb-4">
                    <textarea class="form-control bg-transparent text-white border-secondary" rows="4" placeholder="Mensaje..."></textarea>
                </div>

                <button type="submit" class="btn btn-outline-info w-100 py-3 fw-bold">
                    ENVIAR MENSAJE <i class="fas fa-caret-right ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</main>

<footer class="text-center py-4 text-white-50 small">
    <p>&copy; 2026 PinkFloyd. Todos los derechos reservados.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
